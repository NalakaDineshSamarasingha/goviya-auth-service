spring:
  application:
    name: GOVIYA-AUTH-SERVICE
  boot:
    admin:
      client:
        url: http://localhost:8080
        enabled: true
        auto-registration: true
  profiles:
    active: local

server:
  port: 8080
  servlet:
    context-path: /api/goviya-auth-core

swagger:
  server-url: http://localhost:8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    doc-expansion: none
